name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sc-observability sibling
        run: |
          if [ -f Cargo.toml ]; then
            git clone https://github.com/randlee/sc-observability.git \
              "$GITHUB_WORKSPACE/../../sc-observability"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: |
          if [ -f Cargo.toml ]; then
            cargo fmt --check --all
          else
            echo "No Cargo.toml — skipping (docs-only branch)"
          fi

  clippy:
    name: Clippy
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sc-observability sibling
        run: |
          if [ -f Cargo.toml ]; then
            git clone https://github.com/randlee/sc-observability.git \
              "$GITHUB_WORKSPACE/../../sc-observability"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-clippy-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ubuntu-clippy-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ubuntu-clippy-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: |
          if [ -f Cargo.toml ]; then
            cargo clippy --all-targets --all-features -- -D warnings
          else
            echo "No Cargo.toml — skipping (docs-only branch)"
          fi

  atm-boundary:
    name: ATM boundary (no ATM crate deps)
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce ATM boundary
        run: |
          if grep -r 'agent.team.mail\|agent_team_mail\|atm_\|use atm::\|ATM_HOME' \
               --include='*.rs' --include='Cargo.toml' .; then
            echo "ERROR: ATM crate dependency or ATM_HOME reference found in scterm source."
            echo "All ATM integration must remain in ATM adapters, not in this repo."
            exit 1
          fi
          echo "ATM boundary check passed."

  test:
    name: Test (${{ matrix.os }})
    needs: [fmt, clippy]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sc-observability sibling
        run: |
          if [ -f Cargo.toml ]; then
            git clone https://github.com/randlee/sc-observability.git \
              "$GITHUB_WORKSPACE/../../sc-observability"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-test-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ matrix.os }}-test-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os }}-test-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: |
          if [ -f Cargo.toml ]; then
            cargo build --workspace
          else
            echo "No Cargo.toml — skipping (docs-only branch)"
          fi

      - name: Run tests
        run: |
          if [ -f Cargo.toml ]; then
            cargo test --workspace
          else
            echo "No Cargo.toml — skipping (docs-only branch)"
          fi
